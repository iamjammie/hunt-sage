title: Service Account Interactive Logon
id: a1b2c3d4-e5f6-7890-abcd-ef0123456789
name: service_account_interactive_logon
status: stable
description: |
  Detects interactive logon (Type 2) events from accounts that follow common service account
  naming patterns (svc_, sa_, _svc, service, etc.). Service accounts should never perform
  interactive logons. This activity indicates either credential theft and misuse, or a
  misconfigured environment that should be corrected regardless.
references:
  - https://attack.mitre.org/techniques/T1078/002/
  - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4624
author: hunt-sage (iamjammie)
date: 2025/06/22
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4624
    LogonType: 2
  service_account_naming:
    TargetUserName|contains:
      - 'svc_'
      - '_svc'
      - 'sa_'
      - '_sa'
      - 'service'
      - 'srvc'
      - '_admin'
      - 'adm_'
  filter_system:
    TargetUserName:
      - 'SYSTEM'
      - 'LOCAL SERVICE'
      - 'NETWORK SERVICE'
      - 'DWM-1'
      - 'UMFD-0'
  condition: selection and service_account_naming and not filter_system
falsepositives:
  - Legitimate use of service accounts for testing by administrators (should still be investigated)
  - Break-glass procedures
level: high
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.lateral_movement
  - attack.t1078.002
hunt_notes: |
  When this fires:
  1. Identify which workstation the logon originated from (WorkstationName / IpAddress in event)
  2. Check what the service account did after logon (file access EID 4663, process creation EID 4688)
  3. Determine how the actor obtained service account credentials
     - Password spray (4625 events preceding this)
     - Credential dump (LSASS access on a compromised host)
     - Config file / hardcoded password exposure
  4. Audit all systems this service account has privileges on
kql_equivalent: |
  SecurityEvent
  | where EventID == 4624
  | where LogonType == 2
  | where TargetUserName matches regex @"(?i)(svc_|_svc|sa_|_sa|service|srvc)"
  | where TargetUserName !in ("SYSTEM", "LOCAL SERVICE", "NETWORK SERVICE")
  | project TimeGenerated, Computer, TargetUserName, IpAddress, WorkstationName
  | order by TimeGenerated desc
spl_equivalent: |
  index=wineventlog EventCode=4624 Logon_Type=2
  (user="svc_*" OR user="*_svc" OR user="sa_*" OR user="*service*")
  NOT (user="SYSTEM" OR user="LOCAL SERVICE" OR user="NETWORK SERVICE")
  | table _time, host, user, src_ip, workstation
mitre_mapping:
  tactic: Credential Access, Lateral Movement
  technique: T1078.002
  sub_technique: Valid Accounts - Domain Accounts
